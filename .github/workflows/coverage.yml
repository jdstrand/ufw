name: Coverage
permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  # Runs on all pull requests targeting main

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt .

    - name: Run coverage
      run: |
        make coverage && make coverage-report

    # Publish, don't gate: the per-module table lands on the run's summary
    # page so every run's coverage is visible at a glance (the full
    # per-line report is in the step log above).
    - name: Publish coverage summary
      if: always()
      run: |
        if [ -f .coverage ]; then
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          python3 -m coverage report --format=markdown --omit="tests/*" >> "$GITHUB_STEP_SUMMARY"
        fi
